<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab — Multa Bene Agere</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../style.css">
  <style>
    #lock {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
    }
    #lock .lock-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 32px;
    }
    #lock input {
      font-family: var(--serif);
      font-style: italic;
      font-size: 17px;
      border: none;
      border-bottom: 1px solid var(--rule-strong);
      background: transparent;
      padding: 0.4rem 0.2rem;
      outline: none;
      width: 200px;
      text-align: center;
      color: var(--ink);
    }
    #lock input::placeholder { color: var(--ash); }
    #lock button {
      display: block;
      margin: 1.5rem auto 0;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 1px solid var(--copper);
      padding-bottom: 2px;
      transition: color 120ms ease;
    }
    #lock button:hover { color: var(--copper); }
    #lock .err {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9a2020;
      margin-top: 1.2rem;
      min-height: 1.2em;
    }

    #vault { display: none; }

    .file-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .file-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      padding: 18px 0;
      border-bottom: 1px solid var(--rule);
    }
    .file-list li:first-child { border-top: 1px solid var(--rule); }
    .file-list a {
      font-family: var(--serif);
      font-size: 17px;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--copper);
      padding-bottom: 1px;
      transition: color 120ms ease;
    }
    .file-list a:hover { color: var(--copper); }
    .file-list .fl-date {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--ash);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .private-notice {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--rule-strong);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      font-family: var(--serif);
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }
    .private-notice em { font-style: italic; color: var(--ink); }
    .private-notice a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--copper);
      padding-bottom: 1px;
    }
    .private-notice a:hover { color: var(--copper); }
    .private-notice .pn-r {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ash);
      text-align: right;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .private-notice { grid-template-columns: 1fr; gap: 16px; }
      .private-notice .pn-r { text-align: left; }
    }
  </style>
</head>
<body>
  <main class="shell">

    <header class="masthead">
      <a class="wm" href="/" aria-label="Multa Bene Agere — home">
        <span class="wm-mba">MBA</span>
        <span class="wm-dot" aria-hidden="true"></span>
        <span class="wm-name">Multa Bene Agere</span>
      </a>
      <div class="masthead-meta">
        <span>Reykjavík · Ísland</span>
        <span class="dot-sep">·</span>
        <span>Lab</span>
      </div>
    </header>

    <div id="lock">
      <div class="lock-label">Lab — einkasvæði</div>
      <input type="password" id="pw" placeholder="lykilorð" autocomplete="off">
      <button onclick="unlock()">Opna</button>
      <div class="err" id="err"></div>
    </div>

    <div id="vault">
      <div class="page-h">
        <div class="roman">§</div>
        <h1>Lab.</h1>
        <div class="meta">– Skrár búnar til með Claude · File wallet –</div>
      </div>

      <ul class="file-list" id="file-list"></ul>

      <div class="private-notice">
        <div><em>Private workspace.</em> If you reached this page by accident, the front door is <a href="/">one click away</a>.</div>
        <div class="pn-r">
          Multabene.is<br>
          Multa Bene Agere ehf.
        </div>
      </div>
    </div>

  </main>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function unlock() {
      const pw = document.getElementById('pw').value;
      const hash = await sha256(pw);
      if (hash === await sha256('labmaja')) {
        sessionStorage.setItem('lab_ok', '1');
        showVault();
      } else {
        document.getElementById('err').textContent = 'Rangt lykilorð';
        document.getElementById('pw').value = '';
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    function formatDate(d) {
      return d.replace(/-/g, ' · ');
    }

    function showVault() {
      document.getElementById('lock').style.display = 'none';
      document.getElementById('vault').style.display = 'block';
      fetch('files.json?v=' + Date.now())
        .then(r => r.json())
        .then(files => {
          const ul = document.getElementById('file-list');
          files.forEach(f => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${f.file}" target="_blank">${f.name}</a><div class="fl-date">${formatDate(f.date)}</div>`;
            ul.appendChild(li);
          });
        });
    }

    if (sessionStorage.getItem('lab_ok') === '1') showVault();
  </script>

</body>
</html>
