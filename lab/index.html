<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab — Multa Bene</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f6f4f0;
      font-family: 'Playfair Display', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* --- PASSWORD SCREEN --- */
    #lock {
      text-align: center;
    }
    #lock h1 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 2rem;
      color: #1a1a1a;
      letter-spacing: 0.02em;
    }
    #lock input {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.35);
      background: transparent;
      padding: 0.4rem 0.2rem;
      outline: none;
      width: 180px;
      text-align: center;
      color: #1a1a1a;
    }
    #lock input::placeholder { color: rgba(0,0,0,0.3); }
    #lock button {
      display: block;
      margin: 1.5rem auto 0;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #1a1a1a;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
      text-decoration-color: rgba(0,0,0,0.35);
    }
    #lock button:hover { text-decoration-color: rgba(0,0,0,0.75); }
    #lock .err {
      font-size: 0.8rem;
      color: #a00;
      margin-top: 0.8rem;
      min-height: 1.2em;
    }

    /* --- FILE LIST --- */
    #vault { display: none; width: 100%; max-width: 560px; }
    #vault h1 {
      font-size: 1.4rem;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 0.3rem;
    }
    #vault .sub {
      font-size: 0.8rem;
      color: rgba(0,0,0,0.4);
      margin-bottom: 2.5rem;
      font-family: sans-serif;
    }
    #file-list { list-style: none; }
    #file-list li {
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 1rem 0;
    }
    #file-list li:first-child { border-top: 1px solid rgba(0,0,0,0.1); }
    #file-list a {
      color: #1a1a1a;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
      text-decoration-color: rgba(0,0,0,0.35);
      font-size: 1rem;
    }
    #file-list a:hover { text-decoration-color: rgba(0,0,0,0.75); }
    #file-list .date {
      font-size: 0.75rem;
      color: rgba(0,0,0,0.35);
      font-family: sans-serif;
      margin-top: 0.25rem;
    }
    .back {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: rgba(0,0,0,0.35);
      font-family: sans-serif;
      text-decoration: none;
    }
    .back:hover { color: rgba(0,0,0,0.6); }
  </style>
</head>
<body>

  <!-- PASSWORD -->
  <div id="lock">
    <h1>Lab</h1>
    <input type="password" id="pw" placeholder="lykilorð" autocomplete="off">
    <button onclick="unlock()">Opna</button>
    <div class="err" id="err"></div>
  </div>

  <!-- VAULT -->
  <div id="vault">
    <h1>Lab</h1>
    <div class="sub">skrár búnar til með Claude</div>
    <ul id="file-list"></ul>
    <a class="back" href="/">← multabene.is</a>
  </div>

  <script>
    const HASH = '7a98a0a0a5e3f1f7c7b0e6d7e9c2f4b3d5a1e8c6f0b2d4a9e7c1f3b5d0a2e4c8';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function unlock() {
      const pw = document.getElementById('pw').value;
      const hash = await sha256(pw);
      if (hash === await sha256('labmaja')) {
        sessionStorage.setItem('lab_ok', '1');
        showVault();
      } else {
        document.getElementById('err').textContent = 'Rangt lykilorð';
        document.getElementById('pw').value = '';
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    function showVault() {
      document.getElementById('lock').style.display = 'none';
      document.getElementById('vault').style.display = 'block';
      fetch('files.json?v=' + Date.now())
        .then(r => r.json())
        .then(files => {
          const ul = document.getElementById('file-list');
          files.forEach(f => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${f.file}" target="_blank">${f.name}</a><div class="date">${f.date}</div>`;
            ul.appendChild(li);
          });
        });
    }

    if (sessionStorage.getItem('lab_ok') === '1') showVault();
  </script>

</body>
</html>
